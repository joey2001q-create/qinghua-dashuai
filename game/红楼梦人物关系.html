<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>红楼梦人物关系</title>
  <style>
    :root {
      --paper: #f6ead8;
      --paper-deep: #ead8bd;
      --ink: #30261f;
      --muted: #766554;
      --ruby: #9e2f32;
      --gold: #b8873f;
      --teal: #2f706a;
      --indigo: #465a88;
      --green: #597746;
      --panel: rgba(255, 249, 239, 0.92);
      --line: rgba(96, 73, 52, 0.25);
      --shadow: 0 20px 50px rgba(72, 47, 29, 0.16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 8%, rgba(184, 135, 63, 0.16), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(47, 112, 106, 0.12), transparent 30%),
        linear-gradient(180deg, #fbf4e8 0%, #efe0c7 100%);
      font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
      min-height: 100vh;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(1560px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .title-card,
    .graph-shell,
    .detail-card,
    .source-card {
      border: 1px solid rgba(135, 91, 46, 0.2);
      background: var(--panel);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .title-card {
      padding: 24px 26px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      min-height: 176px;
      position: relative;
      isolation: isolate;
    }

    .title-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 18%, rgba(158, 47, 50, 0.14), transparent 28%),
        radial-gradient(circle at 82% 34%, rgba(47, 112, 106, 0.12), transparent 30%),
        linear-gradient(90deg, rgba(255, 250, 241, 0.7), rgba(246, 234, 216, 0.42));
      opacity: 1;
      z-index: -1;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 4.2vw, 66px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 860px;
      color: #5f4d3f;
      font-size: 17px;
      line-height: 1.8;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 86px);
      gap: 10px;
    }

    .stat {
      border-left: 3px solid var(--ruby);
      background: rgba(255, 252, 246, 0.7);
      padding: 10px 12px;
      min-height: 70px;
    }

    .stat b {
      display: block;
      font-size: 25px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(780px, 1fr) 390px;
      gap: 18px;
      align-items: start;
    }

    .graph-shell {
      min-height: 840px;
      background:
        linear-gradient(180deg, rgba(255, 250, 241, 0.94), rgba(247, 235, 213, 0.92)),
        repeating-linear-gradient(90deg, rgba(122, 89, 52, 0.05) 0 1px, transparent 1px 74px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid rgba(135, 91, 46, 0.18);
      background: rgba(255, 250, 242, 0.78);
    }

    .search-box {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      background: #fff9ef;
      border: 1px solid rgba(109, 76, 42, 0.22);
      border-radius: var(--radius);
      padding: 8px 11px;
    }

    .search-box svg {
      width: 18px;
      height: 18px;
      color: var(--gold);
    }

    .search-box input {
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      min-width: 0;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .filter-btn,
    .reset-btn {
      border: 1px solid rgba(109, 76, 42, 0.24);
      background: #fff8ee;
      color: #5b4637;
      border-radius: 999px;
      padding: 7px 11px;
      cursor: pointer;
      transition: 160ms ease;
      font-size: 14px;
      white-space: nowrap;
    }

    .filter-btn:hover,
    .reset-btn:hover,
    .filter-btn.active {
      color: white;
      background: var(--ruby);
      border-color: var(--ruby);
    }

    .graph-scroll {
      overflow: auto;
      padding: 16px;
    }

    .graph-stage {
      position: relative;
      width: 1280px;
      height: 760px;
      border: 1px solid rgba(133, 93, 50, 0.2);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 44%, rgba(158, 47, 50, 0.08), transparent 20%),
        radial-gradient(circle at 28% 62%, rgba(47, 112, 106, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(255, 250, 241, 0.98), rgba(242, 226, 198, 0.95)),
        repeating-linear-gradient(0deg, rgba(105, 80, 51, 0.035) 0 1px, transparent 1px 18px);
    }

    .graph-stage::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(158, 47, 50, 0.1);
      pointer-events: none;
    }

    #edgeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .edge {
      stroke: var(--line);
      stroke-width: 1.4;
      transition: 180ms ease;
    }

    .edge.love { stroke: rgba(158, 47, 50, 0.34); }
    .edge.family { stroke: rgba(184, 135, 63, 0.36); }
    .edge.power { stroke: rgba(70, 90, 136, 0.35); }
    .edge.servant { stroke: rgba(47, 112, 106, 0.35); }
    .edge.plot { stroke: rgba(89, 119, 70, 0.35); }
    .edge.hidden { opacity: 0.05; }
    .edge.focus {
      stroke-width: 3.2;
      opacity: 1;
      filter: drop-shadow(0 2px 3px rgba(96, 52, 25, 0.28));
    }

    .edge-label {
      opacity: 0;
      transition: 180ms ease;
    }

    .edge-label.focus {
      opacity: 1;
    }

    .edge-label rect {
      fill: rgba(255, 249, 239, 0.94);
      stroke: rgba(158, 47, 50, 0.28);
      stroke-width: 1;
      rx: 5;
    }

    .edge-label text {
      fill: #5d302d;
      font-size: 13px;
      font-weight: 700;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }

    .node {
      position: absolute;
      z-index: 2;
      width: 86px;
      min-height: 108px;
      transform: translate(-50%, -50%);
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      color: var(--ink);
      transition: transform 180ms ease, opacity 180ms ease, filter 180ms ease;
    }

    .node.hidden-by-filter {
      display: none;
    }

    .node.dimmed {
      opacity: 0.27;
      filter: grayscale(0.35);
    }

    .node.linked {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .node.active {
      z-index: 5;
      transform: translate(-50%, -50%) scale(1.17);
    }

    .portrait {
      width: 68px;
      height: 68px;
      margin: 0 auto 6px;
      border-radius: 50%;
      background-image: url("红楼梦人物关系-头像.png");
      background-size: 900% 600%;
      background-repeat: no-repeat;
      border: 2px solid rgba(255, 250, 241, 0.95);
      outline: 1px solid rgba(135, 91, 46, 0.38);
      box-shadow: 0 9px 18px rgba(72, 47, 29, 0.2);
      background-color: #efe1ca;
      transition: 180ms ease;
    }

    .node.active .portrait {
      border-color: #fffdf7;
      outline: 4px solid rgba(158, 47, 50, 0.56);
      box-shadow: 0 12px 26px rgba(158, 47, 50, 0.32);
    }

    .node.linked:not(.active) .portrait {
      outline: 3px solid rgba(47, 112, 106, 0.45);
    }

    .node-name {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      max-width: 88px;
      min-height: 28px;
      padding: 4px 7px;
      border: 1px solid rgba(135, 91, 46, 0.26);
      background: rgba(255, 249, 239, 0.94);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      box-shadow: 0 6px 12px rgba(72, 47, 29, 0.1);
    }

    .node.active .node-name {
      color: #fff;
      background: var(--ruby);
      border-color: var(--ruby);
    }

    .group-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      color: white;
      background: var(--ruby);
      font-size: 13px;
      font-weight: 700;
    }

    .detail-card {
      position: sticky;
      top: 18px;
      min-height: 760px;
      background:
        linear-gradient(180deg, rgba(255, 250, 242, 0.98), rgba(244, 229, 205, 0.96));
    }

    .detail-head {
      padding: 20px;
      background:
        linear-gradient(135deg, rgba(158, 47, 50, 0.14), rgba(47, 112, 106, 0.1)),
        rgba(255, 250, 241, 0.82);
      border-bottom: 1px solid rgba(135, 91, 46, 0.18);
    }

    .detail-person {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .detail-avatar {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background-image: url("红楼梦人物关系-头像.png");
      background-size: 900% 600%;
      background-repeat: no-repeat;
      border: 3px solid #fffaf1;
      outline: 3px solid rgba(158, 47, 50, 0.42);
      box-shadow: 0 12px 22px rgba(72, 47, 29, 0.18);
      background-color: #efe1ca;
    }

    .detail-head h2 {
      margin: 8px 0 6px;
      font-size: 34px;
      line-height: 1;
    }

    .detail-role {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .detail-body {
      padding: 18px 20px 22px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 16px 0 10px;
      font-size: 16px;
      font-weight: 900;
      color: #3d2d23;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .trait-list,
    .story-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .trait-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .trait-list li,
    .story-list li {
      border: 1px solid rgba(135, 91, 46, 0.17);
      background: rgba(255, 252, 247, 0.72);
      border-radius: var(--radius);
      padding: 9px 10px;
      line-height: 1.55;
    }

    .trait-list li {
      color: #633b36;
      font-weight: 800;
      text-align: center;
    }

    .story-list li {
      color: #5e4a3c;
      font-size: 14px;
    }

    .exam-note {
      margin: 0;
      padding: 12px;
      border-left: 4px solid var(--gold);
      background: rgba(255, 246, 225, 0.86);
      line-height: 1.7;
      color: #5d4838;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .relation-list {
      display: grid;
      gap: 8px;
    }

    .relation-row {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 7px 10px;
      text-align: left;
      border: 1px solid rgba(135, 91, 46, 0.17);
      background: rgba(255, 252, 247, 0.8);
      border-radius: var(--radius);
      padding: 9px 10px;
      cursor: pointer;
      color: var(--ink);
      transition: 160ms ease;
    }

    .relation-row:hover {
      border-color: rgba(158, 47, 50, 0.38);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(72, 47, 29, 0.12);
    }

    .relation-row span {
      color: var(--ruby);
      font-weight: 900;
      white-space: nowrap;
    }

    .relation-row strong {
      font-size: 14px;
      color: #4b382f;
    }

    .relation-row small {
      grid-column: 1 / -1;
      color: var(--muted);
      line-height: 1.5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #695547;
      font-size: 13px;
    }

    .legend i {
      width: 22px;
      height: 3px;
      border-radius: 999px;
      background: var(--gold);
    }

    .legend .love i { background: var(--ruby); }
    .legend .family i { background: var(--gold); }
    .legend .servant i { background: var(--teal); }
    .legend .power i { background: var(--indigo); }
    .legend .plot i { background: var(--green); }

    .source-card {
      margin-top: 18px;
      padding: 16px 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .source-card a {
      color: #7c2b2d;
      font-weight: 800;
      text-decoration: none;
      margin-right: 10px;
    }

    @media (max-width: 1180px) {
      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .title-card {
        grid-template-columns: 1fr;
      }

      .hero-stats {
        width: min(100%, 520px);
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .detail-card {
        position: static;
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: calc(100vw - 20px);
        padding-top: 12px;
      }

      .title-card {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .hero-stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .filters {
        justify-content: flex-start;
      }

      .detail-person {
        grid-template-columns: 76px minmax(0, 1fr);
      }

      .detail-avatar {
        width: 74px;
        height: 74px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="title-card">
        <div>
          <h1>红楼梦人物关系</h1>
          <p class="subtitle">40 个常考人物以关系网呈现。点击任意人物，人物性格、典型情节、关联人物与故事连线会同步高亮，适合复习“谁与谁因什么故事相连”。</p>
        </div>
        <div class="hero-stats" aria-label="内容统计">
          <div class="stat"><b>40</b><span>常考人物</span></div>
          <div class="stat"><b>60</b><span>故事连线</span></div>
          <div class="stat"><b>7</b><span>人物分组</span></div>
        </div>
      </div>
    </section>

    <section class="workspace" aria-label="动态人物关系图">
      <div class="graph-shell">
        <div class="toolbar">
          <label class="search-box" aria-label="搜索人物">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="m21 21-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"/>
            </svg>
            <input id="searchInput" type="search" placeholder="只搜索人物姓名，如：黛玉、宝钗、王熙凤" />
          </label>
          <div class="filters" id="filters" aria-label="人物分组筛选"></div>
        </div>
        <div class="graph-scroll">
          <div class="graph-stage" id="graphStage" aria-label="红楼梦 40 人物动态关系网络">
            <svg id="edgeLayer" viewBox="0 0 1280 760" aria-hidden="true"></svg>
          </div>
        </div>
        <div class="legend" aria-label="关系类型图例">
          <span class="love"><i></i>情感婚恋</span>
          <span class="family"><i></i>亲族辈分</span>
          <span class="servant"><i></i>主仆知己</span>
          <span class="power"><i></i>权力管家</span>
          <span class="plot"><i></i>关键情节</span>
        </div>
      </div>

      <aside class="detail-card" aria-live="polite">
        <div class="detail-head">
          <div class="detail-person">
            <div class="detail-avatar" id="detailAvatar"></div>
            <div>
              <span class="group-pill" id="detailGroup">荣国府核心</span>
              <h2 id="detailName">贾宝玉</h2>
              <p class="detail-role" id="detailRole"></p>
            </div>
          </div>
        </div>
        <div class="detail-body">
          <div class="section-title">性格关键词</div>
          <ul class="trait-list" id="traitList"></ul>

          <div class="section-title">典型故事</div>
          <ul class="story-list" id="storyList"></ul>

          <div class="section-title">常考提示</div>
          <p class="exam-note" id="examNote"></p>

          <div class="section-title">
            <span>关联人物与故事线</span>
            <button class="reset-btn" id="resetBtn" type="button">回到宝玉</button>
          </div>
          <div class="relation-list" id="relationList"></div>
        </div>
      </aside>
    </section>

    <footer class="source-card">
      资料底本参考《红楼梦》原著常见情节，并核对了人物谱系与金陵十二钗名单：
      <a href="https://zh.wikisource.org/wiki/%E7%B4%85%E6%A8%93%E5%A4%A2" target="_blank" rel="noreferrer">维基文库《红楼梦》</a>
      <a href="https://zh.wikipedia.org/wiki/%E7%BA%A2%E6%A5%BC%E6%A2%A6%E4%BA%BA%E7%89%A9%E5%88%97%E8%A1%A8" target="_blank" rel="noreferrer">红楼梦角色列表</a>
      <a href="https://zh.wikipedia.org/wiki/%E9%87%91%E9%99%B5%E5%8D%81%E4%BA%8C%E9%92%97" target="_blank" rel="noreferrer">金陵十二钗</a>
    </footer>
  </main>

  <script>
    const groups = [
      ["all", "全部"],
      ["core", "宝黛钗"],
      ["rong", "荣国府"],
      ["ning", "宁国府"],
      ["xue", "薛家外戚"],
      ["maid", "丫鬟仆从"],
      ["story", "线索人物"]
    ];

    const groupMeta = {

      {

    const peopleById = new Map(people.map((person) => [person.id, person]));
    let activeId = "baoyu";
    let activeGroup = "all";
    let searchText = "";

    const stage = document.getElementById("graphStage");
    const edgeLayer = document.getElementById("edgeLayer");
    const filters = document.getElementById("filters");
    const searchInput = document.getElementById("searchInput");
    const resetBtn = document.getElementById("resetBtn");

    function avatarPosition(avatar) {
      const [col, row] = avatar;
      return `${(col / 8) * 100}% ${(row / 5) * 100}%`;
    }

    function matchesSearch(person) {
      if (!searchText) return true;
      return person.name.includes(searchText);
    }

    function visiblePerson(person) {
      const groupOk = activeGroup === "all" || person.group === activeGroup;
      return groupOk && matchesSearch(person);
    }

    function connectedIds(id) {
      const ids = new Set([id]);
      edges.forEach((edge) => {
        if (edge.from === id) ids.add(edge.to);
        if (edge.to === id) ids.add(edge.from);
      });
      return ids;
    }

    function setActive(id) {
      activeId = id;
      render();
    }

    function buildFilters() {
      filters.innerHTML = groups.map(([id, label]) => (
        `<button type="button" class="filter-btn${id === activeGroup ? " active" : ""}" data-group="${id}">${label}</button>`
      )).join("");
      filters.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          activeGroup = button.dataset.group;
          render();
        });
      });
    }

    function buildNodes() {
      people.forEach((person) => {
        const node = document.createElement("button");
        node.type = "button";
        node.className = "node";
        node.dataset.id = person.id;
        node.style.left = `${person.x}px`;
        node.style.top = `${person.y}px`;
        node.innerHTML = `
          <span class="portrait" aria-hidden="true"></span>
          <span class="node-name">${person.name}</span>
        `;
        node.querySelector(".portrait").style.backgroundPosition = avatarPosition(person.avatar);
        node.addEventListener("click", () => setActive(person.id));
        stage.appendChild(node);
      });
    }

    function drawEdges() {
      edgeLayer.innerHTML = "";
      const activeConnections = connectedIds(activeId);
      const visibleIds = new Set(people.filter(visiblePerson).map((person) => person.id));

      edges.forEach((edge, index) => {
        const from = peopleById.get(edge.from);
        const to = peopleById.get(edge.to);
        const isActive = edge.from === activeId || edge.to === activeId;
        const isVisible = visibleIds.has(edge.from) && visibleIds.has(edge.to);
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", from.x);
        line.setAttribute("y1", from.y);
        line.setAttribute("x2", to.x);
        line.setAttribute("y2", to.y);
        line.classList.add("edge", edge.type);
        if (!isVisible || (!isActive && activeConnections.size > 1)) line.classList.add("hidden");
        if (isActive) line.classList.add("focus");
        edgeLayer.appendChild(line);

        const midX = (from.x + to.x) / 2;
        const midY = (from.y + to.y) / 2;
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const length = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
        const offset = index % 2 === 0 ? 10 : -10;
        const labelX = midX + (-dy / length) * offset;
        const labelY = midY + (dx / length) * offset;
        const width = Math.min(176, Math.max(74, edge.story.length * 12 + 20));

        const label = document.createElementNS("http://www.w3.org/2000/svg", "g");
        label.classList.add("edge-label");
        if (isActive && isVisible) label.classList.add("focus");
        label.setAttribute("transform", `translate(${labelX} ${labelY})`);
        label.innerHTML = `
          <rect x="${-width / 2}" y="-14" width="${width}" height="28"></rect>
          <text x="0" y="1">${edge.story}</text>
        `;
        edgeLayer.appendChild(label);
      });
    }

    function renderNodes() {
      const links = connectedIds(activeId);
      document.querySelectorAll(".node").forEach((node) => {
        const person = peopleById.get(node.dataset.id);
        const visible = visiblePerson(person);
        node.classList.toggle("hidden-by-filter", !visible);
        node.classList.toggle("active", person.id === activeId);
        node.classList.toggle("linked", person.id !== activeId && links.has(person.id));
        node.classList.toggle("dimmed", visible && !links.has(person.id));
      });
    }

    function renderDetail() {
      const person = peopleById.get(activeId);
      const meta = groupMeta[person.group];
      const detailAvatar = document.getElementById("detailAvatar");
      detailAvatar.style.backgroundPosition = avatarPosition(person.avatar);
      document.getElementById("detailGroup").textContent = meta.label;
      document.getElementById("detailGroup").style.background = meta.color;
      document.getElementById("detailName").textContent = person.name;
      document.getElementById("detailRole").textContent = person.role;
      document.getElementById("traitList").innerHTML = person.traits.map((trait) => `<li>${trait}</li>`).join("");
      document.getElementById("storyList").innerHTML = person.stories.map((story) => `<li>${story}</li>`).join("");
      document.getElementById("examNote").textContent = person.exam;

      const relationList = document.getElementById("relationList");
      const related = edges.filter((edge) => edge.from === activeId || edge.to === activeId);
      relationList.innerHTML = related.map((edge) => {
        const otherId = edge.from === activeId ? edge.to : edge.from;
        const other = peopleById.get(otherId);
        return `
          <button type="button" class="relation-row" data-target="${otherId}">
            <span>${other.name}</span>
            <strong>${edge.story}</strong>
            <small>${edge.detail}</small>
          </button>
        `;
      }).join("");
      relationList.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => setActive(button.dataset.target));
      });
    }

    function render() {
      buildFilters();
      renderNodes();
      drawEdges();
      renderDetail();
    }

    searchInput.addEventListener("input", (event) => {
      searchText = event.target.value.trim();
      render();
    });

    resetBtn.addEventListener("click", () => {
      activeGroup = "all";
      searchText = "";
      searchInput.value = "";
      setActive("baoyu");
    });

    buildNodes();
    render();
  </script>
