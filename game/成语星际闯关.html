<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成语星际闯关</title>
  <style>
    :root {
      --ink: #182033;
      --muted: #63708a;
      --paper: #fffdf8;
      --line: #d8e1ec;
      --blue: #2864d8;
      --cyan: #10a5b8;
      --green: #1f9f6b;
      --yellow: #f3b43f;
      --red: #de4c42;
      --violet: #7c57d6;
      --shadow: 0 18px 40px rgba(21, 32, 55, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(40, 100, 216, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(31, 159, 107, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, #f7fbff 0%, #edf7ef 48%, #fff3df 100%);
      background-size: 44px 44px, 44px 44px, auto;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 30px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border: 2px solid #1f2b42;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #fff7ce;
      box-shadow: 6px 6px 0 #1f2b42;
      position: relative;
      overflow: hidden;
    }

    .brand-mark svg {
      width: 42px;
      height: 42px;
    }

    h1 {
      font-size: 1.75rem;
      line-height: 1.1;
      margin: 0;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.92rem;
    }

    .mode-switch {
      display: flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 24px rgba(31, 43, 66, 0.08);
    }

    .mode-btn,
    .icon-btn,
    .primary-btn,
    .ghost-btn {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      color: var(--ink);
    }

    .mode-btn {
      min-width: 88px;
      padding: 10px 12px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .mode-btn.active {
      background: #1f2b42;
      color: white;
      box-shadow: 0 8px 16px rgba(31, 43, 66, 0.22);
    }

    .mode-btn:hover,
    .choice:hover,
    .icon-btn:hover,
    .primary-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 18px;
      align-items: start;
    }

    .game-board {
      border: 2px solid #1f2b42;
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.95);
      box-shadow: var(--shadow);
      min-height: 680px;
      overflow: hidden;
    }

    .board-head {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-bottom: 2px solid #1f2b42;
      background: #fff;
    }

    .stat {
      padding: 14px 16px;
      border-right: 1px solid var(--line);
      min-width: 0;
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .stat-value {
      display: block;
      margin-top: 4px;
      font-size: 1.35rem;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .progress-track {
      height: 14px;
      background:
        repeating-linear-gradient(90deg, rgba(24, 32, 51, 0.11) 0 1px, transparent 1px 28px),
        #edf2f8;
      border-bottom: 1px solid var(--line);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--yellow), var(--blue));
      transition: width 360ms ease;
    }

    .stage {
      padding: 22px;
    }

    .scene {
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
      gap: 18px;
      align-items: stretch;
    }

    .visual-panel {
      min-height: 230px;
      border: 2px solid #1f2b42;
      border-radius: 8px;
      background: #fffdf8;
      position: relative;
      overflow: hidden;
    }

    .visual-panel svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 230px;
    }

    .visual-stamp {
      position: absolute;
      left: 14px;
      top: 14px;
      padding: 7px 10px;
      border: 1px solid rgba(31, 43, 66, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .question-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }

    .level-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .type-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 7px 10px;
      border-radius: 8px;
      background: #e8f6f8;
      color: #087483;
      font-weight: 900;
    }

    .question-text {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1.42;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .tip-box {
      min-height: 52px;
      border-left: 5px solid var(--yellow);
      padding: 10px 12px;
      background: #fff9df;
      border-radius: 8px;
      color: #6b5016;
      font-weight: 700;
      line-height: 1.45;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
      perspective: 1200px;
    }

    .choice {
      border: 0;
      border-radius: 8px;
      background: transparent;
      display: block;
      width: 100%;
      height: 126px;
      min-height: 126px;
      padding: 0;
      font-size: 1.28rem;
      font-weight: 900;
      text-align: center;
      overflow-wrap: anywhere;
      perspective: 1000px;
    }

    .choice-card {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 126px;
      transform-style: preserve-3d;
      transition: transform 520ms cubic-bezier(0.2, 0.72, 0.2, 1);
    }

    .choice.flipped .choice-card {
      transform: rotateY(180deg);
    }

    .choice-face {
      position: absolute;
      inset: 0;
      border: 2px solid #1f2b42;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 6px 0 #1f2b42;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .choice-front {
      font-size: 1.28rem;
    }

    .choice-back {
      transform: rotateY(180deg);
      align-items: flex-start;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .choice-word {
      display: block;
      width: 100%;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 900;
    }

    .choice-meaning {
      display: block;
      width: 100%;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.38;
      font-weight: 800;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .choice.correct .choice-face {
      background: #dff7e8;
      border-color: #168454;
      color: #115a3c;
      box-shadow: 0 6px 0 #168454;
    }

    .choice.correct .choice-word,
    .choice.correct .choice-meaning {
      color: #115a3c;
    }

    .choice.wrong .choice-face {
      background: #ffe5e1;
      border-color: #b43a32;
      color: #8b2d27;
      box-shadow: 0 6px 0 #b43a32;
    }

    .choice.wrong .choice-word,
    .choice.wrong .choice-meaning {
      color: #8b2d27;
    }

    .choice.eliminated {
      opacity: 0.28;
      pointer-events: none;
      filter: grayscale(0.8);
    }

    .choice:disabled {
      cursor: default;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .left-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .icon-btn,
    .ghost-btn {
      min-height: 44px;
      padding: 0 14px;
      background: #f4f7fb;
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .icon-btn:disabled,
    .primary-btn:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    .primary-btn {
      min-height: 46px;
      min-width: 118px;
      padding: 0 18px;
      background: #1f2b42;
      color: white;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(31, 43, 66, 0.2);
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 2px solid #1f2b42;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 34px rgba(31, 43, 66, 0.1);
      overflow: hidden;
    }

    .panel-title {
      margin: 0;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 1rem;
      background: #fffdf8;
    }

    .rank-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      align-items: center;
    }

    .rank-icon {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      background: #fff1b8;
      border: 2px solid #1f2b42;
      display: grid;
      place-items: center;
      box-shadow: 5px 5px 0 #1f2b42;
    }

    .rank-icon svg {
      width: 42px;
      height: 42px;
    }

    .rank-name {
      font-size: 1.15rem;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .rank-note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .badge {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .badge.unlocked {
      border-color: #1f2b42;
      background: #fff7d8;
      box-shadow: 0 5px 0 #1f2b42;
    }

    .badge-name {
      font-weight: 900;
      font-size: 0.9rem;
    }

    .badge-meta {
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.3;
    }

    .mini-list {
      padding: 8px 14px 14px;
      display: grid;
      gap: 8px;
    }

    .mini-item {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid #ecf0f5;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .mini-item strong {
      color: var(--ink);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      translate: -50% 20px;
      min-width: min(420px, calc(100% - 32px));
      padding: 12px 16px;
      border: 2px solid #1f2b42;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 34px rgba(24, 32, 51, 0.2);
      font-weight: 900;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, translate 180ms ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      translate: -50% 0;
    }

    .burst {
      position: fixed;
      left: 0;
      top: 0;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 25;
      animation: fall 900ms ease forwards;
    }

    .answer-flash {
      animation: pop 230ms ease;
    }

    .float-score {
      position: absolute;
      right: 18px;
      top: 18px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #1f2b42;
      color: #fff;
      font-weight: 900;
      animation: floatUp 760ms ease forwards;
      pointer-events: none;
    }

    .end-screen {
      padding: 34px 22px;
      display: grid;
      place-items: center;
      min-height: 560px;
      text-align: center;
      background:
        linear-gradient(90deg, rgba(40, 100, 216, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(243, 180, 63, 0.1) 1px, transparent 1px),
        #fffdf8;
      background-size: 34px 34px;
    }

    .end-box {
      width: min(620px, 100%);
    }

    .end-art {
      width: 190px;
      height: 150px;
      margin: 0 auto 14px;
    }

    .end-title {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.2;
    }

    .end-copy {
      margin: 0 auto 18px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.55;
      max-width: 520px;
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .score-cell {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .score-cell span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .score-cell strong {
      display: block;
      font-size: 1.35rem;
      margin-top: 4px;
    }

    @keyframes fall {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) rotate(var(--r));
      }
    }

    @keyframes pop {
      0% {
        transform: scale(0.98);
      }
      60% {
        transform: scale(1.03);
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        translate: 0 10px;
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        translate: 0 -30px;
      }
    }

    @keyframes bob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes swing {
      0%, 100% {
        transform: rotate(-3deg);
      }
      50% {
        transform: rotate(3deg);
      }
    }

    .bob {
      animation: bob 2.4s ease-in-out infinite;
      transform-origin: center;
    }

    .swing {
      animation: swing 2.1s ease-in-out infinite;
      transform-origin: 50% 12%;
    }

    @media (max-width: 940px) {
      .topbar,
      .layout,
      .scene {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .mode-switch {
        overflow-x: auto;
      }

      .layout {
        display: grid;
      }

      .side {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      h1 {
        font-size: 1.4rem;
      }

      .brand-mark {
        width: 46px;
        height: 46px;
        box-shadow: 4px 4px 0 #1f2b42;
      }

      .board-head,
      .choices,
      .score-row,
      .side {
        grid-template-columns: 1fr;
      }

      .stat {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 11px 14px;
      }

      .stat:last-child {
        border-bottom: 0;
      }

      .stage {
        padding: 14px;
      }

      .visual-panel,
      .visual-panel svg {
        min-height: 220px;
      }

      .question-text {
        font-size: 1.28rem;
      }

      .choice {
        height: 136px;
        min-height: 136px;
        font-size: 1.1rem;
      }

      .choice-card {
        min-height: 136px;
      }

      .actions,
      .left-actions {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
      }

      .primary-btn,
      .icon-btn,
      .ghost-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <rect x="12" y="10" width="40" height="46" rx="5" fill="#fffdf8" stroke="#1f2b42" stroke-width="3" />
            <path d="M20 22h24M20 32h18M20 42h24" stroke="#2864d8" stroke-width="4" stroke-linecap="round" />
            <path d="M43 10l7 8-8-1z" fill="#f3b43f" stroke="#1f2b42" stroke-width="3" />
          </svg>
        </div>
        <div>
          <h1>成语星际闯关</h1>
          <div class="subtitle">1000 个常用成语 · 闯关、连击、集徽章</div>
        </div>
      </div>
      <nav class="mode-switch" aria-label="游戏模式">
        <button class="mode-btn active" data-mode="quest">闯关</button>
        <button class="mode-btn" data-mode="speed">速战</button>
        <button class="mode-btn" data-mode="review">错题</button>
      </nav>
    </header>

    <section class="layout">
      <div class="game-board" id="gameBoard">
        <div class="board-head">
          <div class="stat">
            <span class="stat-label">得分</span>
            <span class="stat-value" id="scoreValue">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">连击</span>
            <span class="stat-value" id="streakValue">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">能量</span>
            <span class="stat-value" id="lifeValue">3</span>
          </div>
          <div class="stat">
            <span class="stat-label">计时</span>
            <span class="stat-value" id="timeValue">--</span>
          </div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="stageRoot"></div>
      </div>

      <aside class="side">
        <section class="panel">
          <h2 class="panel-title">今日称号</h2>
          <div class="rank-card">
            <div class="rank-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64">
                <path d="M18 42h28l-5 12H23z" fill="#f3b43f" stroke="#1f2b42" stroke-width="3" />
                <path d="M16 42c-2-10 2-22 16-30 14 8 18 20 16 30z" fill="#6ed6e5" stroke="#1f2b42" stroke-width="3" />
                <circle cx="32" cy="30" r="8" fill="#fffdf8" stroke="#1f2b42" stroke-width="3" />
                <path d="M32 12v-6M22 18l-4-5M42 18l4-5" stroke="#1f2b42" stroke-width="3" stroke-linecap="round" />
              </svg>
            </div>
            <div>
              <div class="rank-name" id="rankName">成语新星</div>
              <div class="rank-note" id="rankNote">答对 1 题就点亮第一枚徽章。</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2 class="panel-title">徽章墙</h2>
          <div class="badge-grid" id="badgeGrid"></div>
        </section>

        <section class="panel">
          <h2 class="panel-title">学习档案</h2>
          <div class="mini-list">
            <div class="mini-item"><span>最高分</span><strong id="bestScore">0</strong></div>
            <div class="mini-item"><span>已掌握</span><strong id="learnedCount">0</strong></div>
            <div class="mini-item"><span>错题本</span><strong id="wrongCount">0</strong></div>
            <div class="mini-item"><span>最长连击</span><strong id="bestStreak">0</strong></div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const BANK = [
      {
        id: "jing-di-zhi-wa",
        type: "图景",
        visual: "well",

                    <span class="choice-word">${escapeHtml(choice)}</span>
                    <span class="choice-meaning">${escapeHtml(idiomMeaning(choice))}</span>
                  </span>
                </span>
              </button>
            `).join("")}
          </div>
          <div class="actions">
            <div class="left-actions">
              <button class="icon-btn" id="hintBtn" aria-label="提示">提示</button>
              <button class="ghost-btn" id="restartBtn">重来</button>
            </div>
            <button class="primary-btn" id="nextBtn" disabled>下一关</button>
          </div>
        </section>
      `;
      $("#choices").addEventListener("click", event => {
        const button = event.target.closest(".choice");
        if (button) choose(button.dataset.choice, button);
      });
      $("#hintBtn").addEventListener("click", useHint);
      $("#restartBtn").addEventListener("click", () => start(state.mode));
      $("#nextBtn").addEventListener("click", next);
    }

    function choose(choice, button) {
      if (state.answered || state.finished) return;
      const q = currentQuestion();
      const correct = choice === q.answer;
      state.answered = true;
      document.querySelectorAll(".choice").forEach(btn => {
        btn.disabled = true;
        btn.classList.add("flipped");
        if (btn.dataset.choice === q.answer) btn.classList.add("correct");
      });
      button.classList.add(correct ? "correct" : "wrong");
      button.classList.add("answer-flash");
      $("#hintBtn").disabled = true;
      $("#nextBtn").disabled = false;
      if (correct) {
        const fastBonus = state.deadline ? Math.max(0, Math.ceil((state.deadline - Date.now()) / 1000)) : 0;
        const points = 100 + state.streak * 18 + Math.min(60, fastBonus) - (state.hintUsed ? 20 : 0);
        state.score += Math.max(40, points);
        state.streak += 1;
        state.bestRunStreak = Math.max(state.bestRunStreak, state.streak);
        store.totalCorrect += 1;
        store.bestScore = Math.max(store.bestScore, state.score);
        store.bestStreak = Math.max(store.bestStreak, state.bestRunStreak);
        if (!store.learned.includes(q.id)) store.learned.push(q.id);
        store.wrong = store.wrong.filter(id => id !== q.id);
        saveStore();
        floatScore(`+${Math.max(40, points)}`);
        burst(button);
        sound("good");
        $("#tipBox").textContent = `${q.example}`;
        showToast(state.streak >= 3 ? `连击 ${state.streak}！手感来了` : "答对了，继续冲");
      } else {
        state.streak = 0;
        if (state.mode !== "speed") state.lives -= 1;
        if (!store.wrong.includes(q.id)) store.wrong.push(q.id);
        saveStore();
        sound("bad");
        $("#tipBox").textContent = `${q.tip} 例句：${q.example}`;
        showToast(state.lives <= 0 && state.mode !== "speed" ? "能量用完，整理一下再出发" : "差一点，记住这个坑");
      }
      updateHud();
      renderProfile();
      if (state.lives <= 0 && state.mode !== "speed") {
        $("#nextBtn").textContent = "查看战绩";
      }
    }

    function useHint() {
      if (state.answered || state.hintUsed) return;
      const q = currentQuestion();
      const wrongChoices = q.playChoices.filter(choice => choice !== q.answer);
      const candidate = wrongChoices[Math.floor(Math.random() * wrongChoices.length)];
      state.hintUsed = true;
      state.eliminated = candidate;
      document.querySelectorAll(".choice").forEach(btn => {
        if (btn.dataset.choice === candidate) btn.classList.add("eliminated");
      });
      $("#hintBtn").disabled = true;
      $("#tipBox").textContent = q.tip;
      showToast("排除 1 个干扰项");
      sound("hint");
    }

    function next() {
      if (!state.answered) return;
      if (state.lives <= 0 && state.mode !== "speed") {
        finish(false, "能量用完");
        return;
      }
      state.index += 1;
      renderQuestion();
    }

    function finish(win, reason) {
      if (state.finished) return;
      state.finished = true;
      clearInterval(timerId);
      store.bestScore = Math.max(store.bestScore, state.score);
      store.bestStreak = Math.max(store.bestStreak, state.bestRunStreak);
      saveStore();
      $("#progressFill").style.width = "100%";
      updateHud();
      renderProfile();
      const cleared = state.deck.length ? Math.min(state.index + (win ? 0 : 1), state.deck.length) : 0;
      stageRoot.innerHTML = `
        <section class="end-screen">
          <div class="end-box">
            <div class="end-art">${renderEndArt(win)}</div>
            <h2 class="end-title">${win ? "漂亮通关" : reason}</h2>
            <p class="end-copy">${endLine(win)}</p>
            <div class="score-row">
              <div class="score-cell"><span>本局得分</span><strong>${state.score}</strong></div>
              <div class="score-cell"><span>最高连击</span><strong>${state.bestRunStreak}</strong></div>
              <div class="score-cell"><span>已挑战</span><strong>${cleared}/${state.deck.length}</strong></div>
            </div>
            <div class="actions" style="justify-content:center">
              <button class="primary-btn" id="againBtn">再闯一次</button>
              <button class="ghost-btn" id="reviewBtn">练错题</button>
            </div>
          </div>
        </section>
      `;
      $("#againBtn").addEventListener("click", () => start(state.mode === "review" ? "quest" : state.mode));
      $("#reviewBtn").addEventListener("click", () => start("review"));
      if (win) {
        burst($("#gameBoard"));
        showToast("新一轮成语能量已入账");
      }
    }

    function endLine(win) {
      if (win && state.mode === "review") return "错题越来越少，说明脑子里的成语地图正在变清楚。";
      if (win && state.mode === "speed") return "这速度很有压迫感，下一局可以冲更高连击。";
      if (win) return "这局节奏很稳，继续玩会解锁更多徽章。";
      if (store.wrong.length > 0) return "错题本已经记下它们，点“练错题”就能立刻反杀。";
      return "换一组题再来，连击会很快回来的。";
    }

    function renderProfile() {
      const unlocked = BADGES.filter(badge => badge.ok(store));
      const rank = rankFor(store);
      $("#rankName").textContent = rank.name;
      $("#rankNote").textContent = rank.note;
      $("#bestScore").textContent = store.bestScore;
      $("#learnedCount").textContent = `${learnedCountOf(store)}/${FULL_BANK.length}`;
      $("#wrongCount").textContent = store.wrong.length;
      $("#bestStreak").textContent = store.bestStreak;
      $("#badgeGrid").innerHTML = BADGES.map(badge => {
        const ok = badge.ok(store);
        return `
          <div class="badge ${ok ? "unlocked" : ""}">
            <div class="badge-name">${ok ? "已得 " : ""}${badge.name}</div>
            <div class="badge-meta">${badge.text}</div>
          </div>
        `;
      }).join("");
    }

    function rankFor(s) {
      const learned = learnedCountOf(s);
      if (learned >= 800) return { name: "成语馆长", note: "1000 词库快被你点亮了，阅读会越来越顺。" };
      if (learned >= 300) return { name: "成语博士", note: "掌握量已经很扎实，继续冲全词库。" };
      if (learned >= 100) return { name: "百词小将", note: "成语储备开始成规模了。" };
      if (s.bestStreak >= 10) return { name: "连击高手", note: "十连的手感不是运气，是判断力。" };
      if (learned >= 12) return { name: "词海探员", note: "掌握数量上来了，例句会越看越顺。" };
      if (s.totalCorrect >= 1) return { name: "成语新星", note: "第一枚徽章已近在眼前。" };
      return { name: "成语新星", note: "答对 1 题就点亮第一枚徽章。" };
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function floatScore(text) {
      const visual = $("#visualPanel");
      if (!visual) return;
      const el = document.createElement("div");
      el.className = "float-score";
      el.textContent = text;
      visual.appendChild(el);
      setTimeout(() => el.remove(), 780);
    }

    function burst(target) {
      const rect = target.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const colors = ["#2864d8", "#10a5b8", "#1f9f6b", "#f3b43f", "#de4c42", "#7c57d6"];
      for (let i = 0; i < 28; i += 1) {
        const piece = document.createElement("span");
        piece.className = "burst";
        piece.style.left = `${cx}px`;
        piece.style.top = `${cy}px`;
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty("--x", `${Math.random() * 260 - 130}px`);
        piece.style.setProperty("--y", `${Math.random() * 190 - 150}px`);
        piece.style.setProperty("--r", `${Math.random() * 480 - 240}deg`);
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 940);
      }
    }

    function sound(kind) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const now = audioCtx.currentTime;
        const map = {
          good: [660, 880],
          bad: [220, 160],
          hint: [420, 520]
        };
        const notes = map[kind] || map.hint;
        osc.type = "sine";
        osc.frequency.setValueAtTime(notes[0], now);
        osc.frequency.exponentialRampToValueAtTime(notes[1], now + 0.12);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.2);
      } catch (error) {
        return;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function renderEndArt(win) {
      const color = win ? "#f3b43f" : "#6ed6e5";
      return `
        <svg viewBox="0 0 220 170" width="100%" height="100%" aria-hidden="true">
          <rect x="36" y="86" width="148" height="52" rx="8" fill="#fffdf8" stroke="#1f2b42" stroke-width="4"/>
          <path d="M56 86c10-38 32-58 54-58s44 20 54 58z" fill="${color}" stroke="#1f2b42" stroke-width="4"/>
          <circle cx="110" cy="76" r="28" fill="#fff" stroke="#1f2b42" stroke-width="4"/>
          <path d="M96 77h28M99 89c8 7 16 7 23 0" stroke="#1f2b42" stroke-width="4" stroke-linecap="round"/>
          <path d="M74 138l-12 20M146 138l12 20" stroke="#1f2b42" stroke-width="5" stroke-linecap="round"/>
          <path d="M75 44l-15-18M145 44l15-18" stroke="#1f2b42" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
    }

    function renderArt(key) {
      const labels = {
        well: "井", snake: "蛇", stump: "木", boat: "舟", bamboo: "竹", fence: "羊", bell: "铃", flute: "竽",
        tiger: "虎", cup: "杯", target: "箭", zither: "琴", fire: "胆", rooster: "鸡", strategy: "兵", cauldron: "釜",
        cottage: "庐", jujube: "枣", jewel: "珠", seedling: "苗", steps: "步", dragon: "龙", spear: "矛", wheel: "熟",
        stone: "石", snow: "雪", road: "途", drum: "鼓", hearts: "心", crane: "鹤", chisel: "锲", apology: "罪"
      };
      const simpleLabels = ["成", "语", "学", "星", "问", "答", "记", "悟"];
      const colors = ["#2864d8", "#10a5b8", "#1f9f6b", "#f3b43f", "#de4c42", "#7c57d6", "#d28a43", "#5f6778"];
      const number = Number(String(key || "").replace("simple-", ""));
      const index = Number.isFinite(number) ? number % simpleLabels.length : Math.abs(hashKey(key)) % simpleLabels.length;
      const label = labels[key] || simpleLabels[index];
      const color = colors[index];
      return `
        <svg viewBox="0 0 460 300" aria-hidden="true">
          <rect x="28" y="28" width="404" height="244" rx="8" fill="#fffdf8" stroke="#1f2b42" stroke-width="5"/>
          <circle class="bob" cx="230" cy="142" r="70" fill="${color}" opacity="0.18"/>
          <circle cx="230" cy="142" r="58" fill="#ffffff" stroke="#1f2b42" stroke-width="5"/>
          <text x="230" y="164" text-anchor="middle" font-size="64" font-weight="900" fill="${color}" font-family="PingFang SC, Microsoft YaHei, sans-serif">${escapeHtml(label)}</text>
          <path d="M142 226h176" stroke="#1f2b42" stroke-width="8" stroke-linecap="round"/>
          <path d="M174 246h112" stroke="${color}" stroke-width="7" stroke-linecap="round"/>
        </svg>
      `;
    }

    function hashKey(value) {
      return Array.from(String(value || "chengyu")).reduce((sum, char) => sum + char.charCodeAt(0), 0);
    }

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => start(btn.dataset.mode));
    });

    renderProfile();
    start("quest");
  </script>
</body>
</html>
